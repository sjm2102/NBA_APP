<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Bets Dashboard</title>

  <!-- Tabulator -->
  <link href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
<header class="topbar">
  <div>
    <h1>NBA Bets Dashboard</h1>
    <div class="subtitle">Moneyline + Player Props (Points / PA / PRA)</div>
  </div>
  <button onclick="location.reload()">Reload data</button>
</header>

<main class="container">

  <!-- MONEYLINE -->
  <section class="panel">
    <div class="panel-head">
      <h2>Moneyline</h2>
      <div class="filters">
        <input id="mlSearch" class="input" placeholder="Search team…" />
        <input id="mlMinProb" class="input" type="number" step="0.01" value="0.60" />
        <button id="mlClear">Clear</button>
      </div>
    </div>
    <div id="tblMoneyline"></div>
  </section>

  <!-- POINTS -->
  <section class="panel">
    <div class="panel-head">
      <h2>Points</h2>
      <div class="filters">
        <input id="ptSearch" class="input" placeholder="Search player/team…" />
        <select id="ptSide" class="input">
          <option value="">Side (Any)</option>
          <option value="OVER">OVER</option>
          <option value="UNDER">UNDER</option>
        </select>
        <input id="ptMinEdge" class="input" type="number" step="0.01" value="0.03" />
        <button id="ptClear">Clear</button>
      </div>
    </div>
    <div id="tblPoints"></div>
  </section>

  <!-- PA -->
  <section class="panel">
    <div class="panel-head">
      <h2>PA (Points + Assists)</h2>
      <div class="filters">
        <input id="paSearch" class="input" placeholder="Search player/team…" />
        <select id="paSide" class="input">
          <option value="">Side (Any)</option>
          <option value="OVER">OVER</option>
          <option value="UNDER">UNDER</option>
        </select>
        <input id="paMinEdge" class="input" type="number" step="0.01" value="0.03" />
        <button id="paClear">Clear</button>
      </div>
    </div>
    <div id="tblPA"></div>
  </section>

  <!-- PRA -->
  <section class="panel">
    <div class="panel-head">
      <h2>PRA (Points + Rebounds + Assists)</h2>
      <div class="filters">
        <input id="praSearch" class="input" placeholder="Search player/team…" />
        <select id="praSide" class="input">
          <option value="">Side (Any)</option>
          <option value="OVER">OVER</option>
          <option value="UNDER">UNDER</option>
        </select>
        <input id="praMinEdge" class="input" type="number" step="0.01" value="0.03" />
        <button id="praClear">Clear</button>
      </div>
    </div>
    <div id="tblPRA"></div>
  </section>

</main>

<script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
<script src="./app.js"></script>
</body>
</html>
