<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Bets Dashboard</title>

  <!-- Tabulator (table + filters) -->
  <link href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🏀</div>
      <div>
        <div class="title">NBA Bets Dashboard</div>
        <div class="subtitle">Moneyline + Player Lines (Points / PA / PRA)</div>
      </div>
    </div>
    <div class="right">
      <div id="meta" class="meta">Loading…</div>
      <button id="refreshBtn" class="btn">Reload data</button>
    </div>
  </header>

  <main class="container">
    <section class="grid">
      <!-- Moneyline -->
      <article class="panel">
        <div class="panel-head">
          <h2>Moneyline</h2>
          <div class="filters">
            <input id="mlSearch" class="input" placeholder="Search team (away/home/best)…" />
            <label class="label">
              Min prob
              <input id="mlMinProb" class="input small" type="number" step="0.01" min="0" max="1" value="0.60" />
            </label>
            <button id="mlClear" class="btn ghost">Clear</button>
          </div>
        </div>
        <div id="tblMoneyline" class="table"></div>
      </article>

      <!-- Points -->
      <article class="panel">
        <div class="panel-head">
          <h2>Points Lines</h2>
          <div class="filters">
            <input id="ptSearch" class="input" placeholder="Search player/team/opponent…" />
            <select id="ptTeam" class="input select"></select>
            <select id="ptOpp" class="input select"></select>
            <select id="ptSide" class="input select">
              <option value="">Side (Any)</option>
              <option value="OVER">OVER</option>
              <option value="UNDER">UNDER</option>
            </select>
            <label class="label">
              Min edge
              <input id="ptMinEdge" class="input small" type="number" step="0.01" value="0.03" />
            </label>
            <button id="ptClear" class="btn ghost">Clear</button>
          </div>
        </div>
        <div id="tblPoints" class="table"></div>
      </article>

      <!-- PA -->
      <article class="panel">
        <div class="panel-head">
          <h2>PA (Points + Assists)</h2>
          <div class="filters">
            <input id="paSearch" class="input" placeholder="Search player/team/opponent…" />
            <select id="paTeam" class="input select"></select>
            <select id="paOpp" class="input select"></select>
            <select id="paSide" class="input select">
              <option value="">Side (Any)</option>
              <option value="OVER">OVER</option>
              <option value="UNDER">UNDER</option>
            </select>
            <label class="label">
              Min edge
              <input id="paMinEdge" class="input small" type="number" step="0.01" value="0.03" />
            </label>
            <button id="paClear" class="btn ghost">Clear</button>
          </div>
        </div>
        <div id="tblPA" class="table"></div>
      </article>

      <!-- PRA -->
      <article class="panel">
        <div class="panel-head">
          <h2>PRA (Points + Rebounds + Assists)</h2>
          <div class="filters">
            <input id="praSearch" class="input" placeholder="Search player/team/opponent…" />
            <select id="praTeam" class="input select"></select>
            <select id="praOpp" class="input select"></select>
            <select id="praSide" class="input select">
              <option value="">Side (Any)</option>
              <option value="OVER">OVER</option>
              <option value="UNDER">UNDER</option>
            </select>
            <label class="label">
              Min edge
              <input id="praMinEdge" class="input small" type="number" step="0.01" value="0.03" />
            </label>
            <button id="praClear" class="btn ghost">Clear</button>
          </div>
        </div>
        <div id="tblPRA" class="table"></div>
      </article>
    </section>

    <footer class="footer">
      <div>
        Tip: Click any column header to sort. Use the filters to quickly find +EV edges.
      </div>
    </footer>
  </main>

  <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
