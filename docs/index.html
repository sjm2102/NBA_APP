<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NBA Bets Dashboard</title>

  <link href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="title">NBA Bets Dashboard</div>
      <div class="subtitle">Tabbed views • Fast search • Clean tables</div>
    </div>

    <div class="actions">
      <button class="btn ghost" id="reloadBtn">Reload</button>
    </div>
  </header>

  <main class="page">
    <!-- Views bar -->
    <section class="views-bar">
      <div class="views-left">
        <div class="views-label">Views</div>

        <button class="tab-btn active" data-view="moneyline">Predictions</button>
        <button class="tab-btn" data-view="points">RW Projections</button>
        <button class="tab-btn" data-view="pa">Hit Rates</button>
        <button class="tab-btn" data-view="pra">Lines</button>
      </div>

      <div class="views-right">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="globalSearch" class="input" placeholder="Search player/team/opponent…" />
        </div>
        <button class="btn ghost" id="clearSearchBtn">Clear</button>
      </div>
    </section>

    <!-- Content -->
    <section class="panel panel-big">
      <div class="panel-head">
        <div class="panel-title">
          <h2 id="viewTitle">Predictions</h2>
          <div id="viewHint" class="hint">Moneyline model win probabilities</div>
        </div>
      </div>

      <!-- Each view is a container; we show/hide -->
      <div class="view-stack">
        <div class="view active" id="view-moneyline">
          <div class="table-wrap"><div id="tblMoneyline"></div></div>
        </div>

        <div class="view" id="view-points">
          <div class="table-wrap"><div id="tblPoints"></div></div>
        </div>

        <div class="view" id="view-pa">
          <div class="table-wrap"><div id="tblPA"></div></div>
        </div>

        <div class="view" id="view-pra">
          <div class="table-wrap"><div id="tblPRA"></div></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
